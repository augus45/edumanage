name: EduManage CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Configuramos servicios requeridos si decidieramos usar BDs reales en lugar de SQLite in-memory
    # services:
    #   redis:
    #     image: redis:7-alpine
    #     ports:
    #       - 6379:6379

    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: "3.12"
        cache: 'pip' # Caching pip dependencies
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest pytest-asyncio pytest-cov
        if [ -f api/requirements.txt ]; then pip install -r api/requirements.txt; fi
        
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 api/app --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings
        flake8 api/app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Test with pytest
      env:
        ENVIRONMENT: testing
        SECRET_KEY: test_secret_key_123
        DATABASE_URL: sqlite+aiosqlite:///:memory:
        REDIS_URL: redis://localhost:6379/0
      run: |
        cd api
        pytest --cov=app --cov-report=xml
        
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
